<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | Venue Booking System</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="h-screen flex">

<!-- Left Panel -->
<div class="w-2/3 bg-cover bg-center hidden md:block"
     style="background-image: url('');">
</div>

<!-- Right Panel -->
<div class="w-full md:w-1/3 flex items-center justify-center bg-gray-100">

    <div class="w-80">

        <h2 class="text-2xl font-semibold mb-2">Forgot Password</h2>
        <p class="text-gray-500 mb-6">
            Enter your registered email address below and we'll send you a link to reset your password.
        </p>

        <form method="POST" action="/login">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
                class="w-full p-3 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
            >

            <button
                type="submit"
                class="w-full p-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition"
            >
                Reset Password
            </button>

        </form>

        <div class="mt-4 text-center">
            <a href="/login" class="text-purple-600 hover:underline">
                Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
