<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Venue Booking System{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen">
    <div class="bg-white">
        <!-- Header -->
        <header>
            <div class="flex-1">
                <h1 class="text-3xl md:text-4xl font-bold">
                    <a href="/" class="hover:text-white/90 transition-colors">Venue Booking System</a>
                </h1>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-gray-100 border-t border-gray-200 px-10 py-6">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="text-gray-600 text-sm">
                    <p>Saintgits Venue Booking System.</p>
                </div>
                <div class="flex gap-6 text-sm">
                    <a href="/about" class="text-gray-600 hover:text-indigo-600">About</a>
                    <a href="/contact" class="text-gray-600 hover:text-indigo-600">Contact</a>
                    <a href="/help" class="text-gray-600 hover:text-indigo-600">Help</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Extra JavaScript -->
    {% block extra_js %}{% endblock %}
</body>
</html>
