<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Venue Booking System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
}



.left-panel{
width:65%;
background-image:url("");
background-size:cover;
background-position:center;
}


.right-panel{
width:35%;
display:flex;
justify-content:center;
align-items:center;
background:#f5f6fa;
}

.login-box{
width:320px;
}

.login-box h2{
margin-bottom:10px;
}

.login-box p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#6c4bcf;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5b3fc4;
}

.links{
margin-top:15px;
text-align:center;
}

.links a{
text-decoration:none;
color:#6c4bcf;
}

</style>

</head>

<body>

<div class="left-panel"></div>

<div class="right-panel">

<div class="login-box">

<h2>Venue Booking System</h2>
<p>Sign in to your account</p>

<form method="POST" action="/login">

<input
type="email"
name="email"
placeholder="Email"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Sign in
</button>

</form>

<div class="links">

<p>
<a href="/signup">Create account</a>
</p>

<p>
<a href="/forgot-password">Forgot password?</a>
</p>

</div>

</div>

</div>

</body>
</html>
