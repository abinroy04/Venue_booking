<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | Venue Booking</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f6fa;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#6c4bcf;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST" action="/signup">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign Up</button>

</form>

<p>Already have account? <a href="/login">Login</a></p>

</div>

</body>
</html>
